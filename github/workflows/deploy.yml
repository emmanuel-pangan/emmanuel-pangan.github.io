name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Or master, depending on your default branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uses the recommended LTS Node version for modern Angular
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Application
        # Replace YOUR_REPOSITORY_NAME with your exact repository name (keep the slashes!)
        run: npm run build -- --base-href=/emmanuel-pangan.github.io/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # In Angular v20, the production build output lands in the /browser folder.
          # Replace YOUR_REPOSITORY_NAME with your exact repository name.
          path: "./dist/emmanuel-pangan.github.io/browser"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
